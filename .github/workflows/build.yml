name: Build & Release J.A.R.V.I.S.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  QT_VERSION: '6.8.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true
          set-env: true

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $content = Get-Content CMakeLists.txt -Raw
          $content = $content -replace 'project\(Jarvis VERSION \d+\.\d+\.\d+', "project(Jarvis VERSION $version"
          Set-Content CMakeLists.txt $content
          Write-Host "Version set to: $version"

      - name: Find Qt path
        id: qt_path
        shell: pwsh
        run: |
          Write-Host "=== Qt environment variables ==="
          Get-ChildItem env: | Where-Object { $_.Value -match '[Qq]t' } | Format-Table Name, Value
          $qtdir = $null
          if ($env:QT_ROOT_DIR -and (Test-Path $env:QT_ROOT_DIR)) {
            $qtdir = $env:QT_ROOT_DIR
          }
          elseif ($env:Qt6_DIR -and (Test-Path $env:Qt6_DIR)) {
            $qtdir = (Resolve-Path "$env:Qt6_DIR\..\..\..").Path
          }
          elseif ($env:QTDIR -and (Test-Path $env:QTDIR)) {
            $qtdir = $env:QTDIR
          }
          if (-not $qtdir) {
            $wd = Get-Command windeployqt.exe -ErrorAction SilentlyContinue
            if (-not $wd) { $wd = Get-Command windeployqt6.exe -ErrorAction SilentlyContinue }
            if ($wd) { $qtdir = Split-Path (Split-Path $wd.Source) }
          }
          if (-not $qtdir) {
            Write-Error "Cannot find Qt!"
            exit 1
          }
          Write-Host "Qt dir resolved: $qtdir"
          echo "QTDIR=$qtdir" >> $env:GITHUB_OUTPUT
          echo "QTDIR=$qtdir" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_PREFIX_PATH="${{ steps.qt_path.outputs.QTDIR }}"

      - name: Build Release
        run: cmake --build build --config Release --parallel

      - name: Prepare release package
        shell: pwsh
        run: |
          mkdir build\release_package -ErrorAction SilentlyContinue
          $exe = Get-ChildItem -Path build -Recurse -Filter "Jarvis.exe" |
                 Where-Object { $_.DirectoryName -notmatch "release_package" } |
                 Select-Object -First 1
          if (-not $exe) {
            Write-Error "Jarvis.exe not found in build!"
            Get-ChildItem -Path build -Recurse -Filter "*.exe" | Format-Table FullName
            exit 1
          }
          Write-Host "Found exe: $($exe.FullName)"
          Copy-Item $exe.FullName "build\release_package\"
          $wdqt = Join-Path $env:QTDIR "bin\windeployqt.exe"
          if (-not (Test-Path $wdqt)) {
            $wdqt = Join-Path $env:QTDIR "bin\windeployqt6.exe"
          }
          if (-not (Test-Path $wdqt)) {
            $wdqt = (Get-Command windeployqt.exe -ErrorAction SilentlyContinue).Source
          }
          if (-not (Test-Path $wdqt)) {
            $wdqt = (Get-Command windeployqt6.exe -ErrorAction SilentlyContinue).Source
          }
          if (-not $wdqt -or -not (Test-Path $wdqt)) {
            Write-Error "windeployqt not found! QTDIR=$env:QTDIR"
            exit 1
          }
          Write-Host "windeployqt: $wdqt"
          & $wdqt "build\release_package\Jarvis.exe" `
            --release `
            --no-translations `
            --no-opengl-sw `
            --no-system-d3d-compiler `
            --no-compiler-runtime `
            --dir "build\release_package"
          Write-Host "=== Package contents ==="
          Get-ChildItem "build\release_package" -Recurse | Format-Table Name, Length

      - name: Download VC++ Redistributable
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          mkdir redist -ErrorAction SilentlyContinue
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "redist\vc_redist.x64.exe" -UseBasicParsing

      - name: Create ZIP archive
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Copy-Item "redist\vc_redist.x64.exe" "build\release_package\" -ErrorAction SilentlyContinue
          Compress-Archive -Path "build\release_package\*" `
            -DestinationPath "JARVIS-${{ github.ref_name }}-win64.zip"

      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: choco install innosetup -y --no-progress

      - name: Update installer version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $content = Get-Content installer.iss -Raw
          $content = $content -replace '#define MyAppVersion "2.0.0"', "#define MyAppVersion `"$version`""
          Set-Content installer.iss $content

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'
        continue-on-error: true

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            JARVIS-${{ github.ref_name }}-win64.zip
            build/installer/JARVIS-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}